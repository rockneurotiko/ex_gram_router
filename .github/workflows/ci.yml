name: Elixir CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ex-gram-router-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  test:
    name: OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: "28"
            elixir: "1.19"
            linters: true
          - otp: "27"
            elixir: "1.17"
            linters: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get && mix deps.compile

      - name: Check formatting
        if: matrix.linters
        run: mix format --check-formatted

      - name: Run Credo
        if: matrix.linters
        run: mix credo

      - name: Restore PLT cache
        if: matrix.linters
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Run Dialyzer
        if: matrix.linters
        run: mix dialyzer

      - name: Run tests
        run: mix test --warnings-as-errors

      - name: Compile without optional deps
        run: mix compile --force --warnings-as-errors --no-optional-deps
